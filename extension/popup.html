<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WSVPN</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:300px;padding:16px;font:13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#333}
.status-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.status-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.online{background:#22b43c}
.offline{background:#999}
.status-text{font-weight:600;font-size:14px}
.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.toggle-row input{width:40px;height:22px}
h3{font-size:13px;margin:12px 0 6px;color:#666;border-bottom:1px solid #eee;padding-bottom:4px}
label{display:block;margin:4px 0;font-size:12px;color:#555}
input[type=text],input[type=number]{width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:12px;margin:2px 0 8px}
.row{display:flex;gap:8px}.row>*{flex:1}
.check-row{display:flex;align-items:center;gap:6px;margin:6px 0;font-size:12px}
textarea{width:100%;height:30px;font-size:11px;padding:4px;border:1px solid #ccc;border-radius:4px;resize:vertical}
.btn{display:inline-block;padding:6px 16px;margin-top:12px;background:#22b43c;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;width:100%}
.btn:hover{background:#1a8a2e}
.hint{font-size:11px;color:#888;margin-top:4px}
</style>
</head>
<body>
<div class="status-bar">
  <div class="status-dot" id="dot"></div>
  <span class="status-text" id="statusText">Checking...</span>
</div>

<div class="toggle-row">
  <input type="checkbox" id="enabled">
  <span>Enable VPN routing</span>
</div>

<h3>Server</h3>
<div class="row">
  <div><label>Proxy Host</label><input type="text" id="proxyHost" placeholder="10.9.1.1"></div>
  <div><label>Port</label><input type="number" id="proxyPort" placeholder="1744" min="1" max="65535"></div>
</div>

<h3>Routing Rules</h3>
<div class="check-row"><input type="checkbox" id="bypassChina"><span>Route China mainland IPs through VPN</span></div>
<div class="check-row"><input type="checkbox" id="bypassLAN"><span>Route LAN IPs through VPN</span></div>

<label>Custom CIDR (one per line):</label>
<textarea id="customCIDR" placeholder="203.0.113.0/24"></textarea>
<div class="hint">IPs in these ranges go through the VPN proxy.</div>

<button class="btn" id="save">Apply Settings</button>

<script src="popup.js"></script>
</body>
</html>
