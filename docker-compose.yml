# WSVPN Server + Nginx Reverse Proxy
# Usage: docker compose up -d

services:
  wsvpn:
    build: .
    container_name: wsvpn-server
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "127.0.0.1:8180:8180"
    volumes:
      - ./config:/config:ro
      - wsvpn_logs:/var/log/wsvpn
    networks:
      - wsvpn_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8180/ws/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: wsvpn-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/html:/var/www/html:ro
    depends_on:
      - wsvpn
    networks:
      - wsvpn_net

volumes:
  wsvpn_logs:

networks:
  wsvpn_net:
