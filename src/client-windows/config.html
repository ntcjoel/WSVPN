<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>WSVPN Setup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;display:flex;justify-content:center;padding:20px}
.card{background:#fff;border-radius:8px;padding:24px;width:420px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
h2{font-size:18px;margin-bottom:16px;color:#1a1a1a}
label{display:block;font-size:12px;color:#666;margin:10px 0 3px}
input,select{width:100%;padding:8px 10px;border:1px solid #d0d5dd;border-radius:5px;font-size:13px}
input:focus,select:focus{border-color:#22b43c;outline:none;box-shadow:0 0 0 2px rgba(34,180,60,.15)}
.row{display:flex;gap:8px}.row>*{flex:1}
.hint{font-size:11px;color:#999;margin-top:2px}
.btn{width:100%;padding:10px;margin-top:16px;background:#22b43c;color:#fff;border:none;border-radius:5px;font-size:14px;cursor:pointer;font-weight:600}
.btn:hover{background:#1a8a2e}
.msg{margin-top:12px;padding:8px 12px;border-radius:4px;font-size:13px;display:none}
.msg-ok{display:block;background:#e6f7ed;color:#0a5c2a}
.msg-err{display:block;background:#fce8e6;color:#a50e0e}
</style></head><body>
<div class="card">
<h2>WSVPN Setup</h2>
<form id="f">
<label>Server URL</label>
<input type="text" id="server_url" placeholder="wss://your-domain.com" required>
<div class="hint">e.g. wss://app.example.com or ws://10.0.0.1:8180</div>

<label>UUID</label>
<input type="text" id="uuid" placeholder="device-phone-001" required minlength="8">
<div class="hint">Must match an entry in server clients.json</div>

<label>Client IP</label>
<input type="text" id="client_ip" placeholder="10.9.1.2" required>
<div class="hint">VPN IP assigned by server</div>

<label>TUN Name</label>
<input type="text" id="tunname" placeholder="wsc">
<div class="hint">Network adapter name</div>

<label>TLS Fingerprint</label>
<select id="tls_fingerprint">
<option value="chrome">Chrome</option><option value="firefox">Firefox</option>
<option value="ios">iOS Safari</option><option value="edge">Edge</option>
<option value="random">Random per connection</option>
</select>

<label>Traffic Shaping</label>
<select id="traffic_shape">
<option value="off">Off</option><option value="jitter">Jitter (100ms-2s)</option>
<option value="browse" selected>Browse (burst/pause)</option>
</select>
<div class="hint">Browse mode simulates human reading patterns</div>

<div class="row">
<div><label>Reconnect</label><select id="reconnect"><option value="true" selected>Yes</option><option value="false">No</option></select></div>
<div><label>Obfuscation</label><select id="obfuscation"><option value="on" selected>On</option><option value="off">Off</option></select></div>
</div>

<div class="row">
<div><label>Traffic Induction</label><select id="traffic_induction"><option value="false">Off</option><option value="true">On</option></select></div>
<div><label>Log Level</label><select id="log_level"><option value="info">Info</option><option value="debug">Debug</option><option value="warn">Warn</option></select></div>
</div>

<button class="btn" type="submit">Save and Connect</button>
</form>
<div class="msg" id="msg"></div>
</div>
<script>
async function load() {
  try {
    let r = await fetch('/config');
    if (!r.ok) return;
    let c = await r.json();
    document.getElementById('server_url').value = c.server_url || '';
    document.getElementById('uuid').value = c.uuid || '';
    document.getElementById('client_ip').value = c.client_ip || '';
    document.getElementById('tunname').value = c.tunname || 'wsc';
    document.getElementById('tls_fingerprint').value = c.tls_fingerprint || 'chrome';
    document.getElementById('traffic_shape').value = c.traffic_shape || 'browse';
    document.getElementById('reconnect').value = c.reconnect ? 'true' : 'false';
    document.getElementById('obfuscation').value = 'true';
    document.getElementById('traffic_induction').value = c.traffic_induction ? 'true' : 'false';
    document.getElementById('log_level').value = c.log_level || 'info';
  } catch(e) {}
}
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  let cfg = {
    server_url: document.getElementById('server_url').value,
    uuid: document.getElementById('uuid').value,
    client_ip: document.getElementById('client_ip').value,
    tunname: document.getElementById('tunname').value || 'wsc',
    tls_fingerprint: document.getElementById('tls_fingerprint').value,
    traffic_shape: document.getElementById('traffic_shape').value,
    reconnect: document.getElementById('reconnect').value === 'true',
    obfuscation: document.getElementById('obfuscation').value,
    traffic_induction: document.getElementById('traffic_induction').value === 'true',
    log_level: document.getElementById('log_level').value,
    front_domain: '',
    dispersion_peers: [],
    induction_domains: []
  };
  try {
    let r = await fetch('/save', {method:'POST',body:JSON.stringify(cfg)});
    let m = document.getElementById('msg');
    if (r.ok) { m.className='msg msg-ok'; m.textContent='Saved. Connecting... You can close this tab.'; }
    else { m.className='msg msg-err'; m.textContent='Save failed: ' + await r.text(); }
  } catch(err) {
    let m = document.getElementById('msg');
    m.className='msg msg-err'; m.textContent='Error: ' + err;
  }
});
load();
</script>
</body></html>
