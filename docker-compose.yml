# WSVPN Server
# Usage: docker compose up -d

services:
  wsvpn:
    build: .
    container_name: wsvpn-server
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    network_mode: host
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./config:/config:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8180/ws/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
